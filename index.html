<section id="ai-helper">

<h2>Her-Sphere AI Helper</h2>
<p>Ask questions about safety, learning, or earning. If the answer is not available, you can submit a help request.</p>

<div class="chatbox">
<div id="chat-output"></div>

<input type="text" id="user-input" placeholder="Ask a question...">
<button onclick="sendMessage()">Send</button>
</div>

</section>

<script>

function sendMessage(){

let input = document.getElementById("user-input").value;
let output = document.getElementById("chat-output");

let reply = "";

if(input.toLowerCase().includes("safety")){
reply = "If you feel unsafe, move to a public place and contact trusted people immediately.";
}

else if(input.toLowerCase().includes("job") || input.toLowerCase().includes("earn")){
reply = "You can learn freelancing skills like design, writing, or coding to earn online.";
}

else if(input.toLowerCase().includes("study") || input.toLowerCase().includes("learn")){
reply = "Visit the Learn section on Her-Sphere for useful resources.";
}

else{
reply = "I’m not sure about that yet. Please submit your question on the Help page so the community can assist you.";
}

output.innerHTML += "<p><b>You:</b> " + input + "</p>";
output.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

document.getElementById("user-input").value="";

}

</script>
